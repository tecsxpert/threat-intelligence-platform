spring:
  application:
    name: tool-57-threat-intelligence

  # ── Database ──────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  # ── Disable Flyway (not needed with H2) ────────────────
  flyway:
    enabled: false

  # ── Disable Redis ──────────────────────────────────────
  cache:
    type: simple

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # ── Disable Mail ───────────────────────────────────────
  mail:
    host: localhost
    port: 25

# ── Server ────────────────────────────────────────────────
server:
  port: 8080

# ── JWT Settings ──────────────────────────────────────────
app:
  jwt:
    secret: mySuperSecretKeyForJWTThatIsAtLeast32Characters
    expiration-ms: 86400000

  ai-service:
    base-url: http://localhost:5000

# ── Swagger UI ────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
