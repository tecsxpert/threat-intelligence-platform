spring:
  profiles:
    active: dev
  application:
    name: tool-57-threat-intelligence

  # ── Database ──────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:threatdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway controls the schema — never let JPA change it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway (DB migrations) ─────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis (Cache) ──────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 600000      # 10 minutes in milliseconds

  # ── Email ──────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your@email.com}
    password: ${MAIL_PASSWORD:yourpassword}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── Server ────────────────────────────────────────────────
server:
  port: 8080

# ── JWT Settings ──────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJWTThatIsAtLeast32Characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours

  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:5000}

# ── Swagger UI ────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs